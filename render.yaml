# Render Blueprint — ArenaForge Backend
# https://render.com/docs/blueprint-spec
# Build trigger: 2026-05-14 nudge to force webhook re-sync

services:
  - type: web
    name: arenaforge-agent
    runtime: node
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: npm install && npx tsc --outDir dist
    startCommand: node dist/agent/index.js
    envVars:
      - key: USE_TESTNET
        value: "true"
      - key: MONAD_RPC_URL
        sync: false
      - key: MONAD_TESTNET_RPC_URL
        sync: false
      - key: ARENA_AGENT_PRIVATE_KEY
        sync: false
      - key: ARENA_CORE_ADDRESS
        sync: false
      - key: ESCROW_ADDRESS
        sync: false
      - key: MATCH_REGISTRY_ADDRESS
        sync: false
      - key: ORACLE_DUEL_ADDRESS
        sync: false
      - key: STRATEGY_ARENA_ADDRESS
        sync: false
      - key: AUCTION_WARS_ADDRESS
        sync: false
      - key: QUIZ_BOWL_ADDRESS
        sync: false
      - key: SEASONAL_RANKINGS_ADDRESS
        sync: false
      - key: SPECTATOR_BETTING_ADDRESS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NADFUN_API_URL
        value: https://api.nadapp.net
      - key: CORS_ORIGIN
        value: "https://*.vercel.app"
      - key: AUTONOMOUS_ENABLED
        value: "true"
      - key: AUTONOMOUS_INTERVAL_MS
        value: "300000"
      - key: AUTO_CREATE_TOURNAMENTS
        value: "true"
      - key: AUTO_AGENT_DISCOVERY
        value: "true"
      # Slice #8: admin token gating destructive GraphQL mutations
      # (createTournament, pauseTournament, resumeTournament). Leave unset to
      # disable the admin-only path entirely (closed by default).
      - key: ARENA_ADMIN_TOKEN
        sync: false
      # Slice #9: when true, the agent creates a hardcoded "Genesis"
      # tournament on first boot if no tournaments exist on chain. Off by
      # default in production deploys.
      - key: BOOTSTRAP_SEED_TOURNAMENT
        value: "false"
      # Slice #2: structured logging knobs.
      # LOG_LEVEL: debug | info | warn | error | silent (default info)
      # LOG_FORMAT: json | pretty (default json when stdout is not a TTY)
      - key: LOG_LEVEL
        value: "info"
      - key: LOG_FORMAT
        value: "json"
